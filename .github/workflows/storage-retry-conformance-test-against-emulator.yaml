permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'google-cloud-storage/**'
  pull_request:
    paths:
      - 'google-cloud-storage/**'
name: Run Storage retry conformance tests against service emulator
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: google-cloud-storage

    services:
      emulator:
        image: gcr.io/cloud-devrel-public-resources/storage-testbench:latest
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: '3.3'
      - run: ruby --version
      - run: gem install toys
      - run: bundle install
      - run: toys conformance
        env:
          STORAGE_EMULATOR_HOST: localhost:9000
