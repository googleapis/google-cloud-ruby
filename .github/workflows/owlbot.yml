name: OwlBot Manual Run

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      gems:
        description: "List of gems, or --all for all gems"
        required: true
      flags:
        description: "Extra flags to pass to toys owlbot"
        required: false

jobs:
  OwlBot:
    if: ${{ github.repository == 'googleapis/google-cloud-ruby' }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.YOSHI_CODE_BOT_TOKEN }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false
    - name: Install Ruby 3.3
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
      with:
        ruby-version: "3.3"
    - name: Install Bazel
      uses: bazel-contrib/setup-bazel@083175551ceeceebc757ebee2127fde78840ca77 # 0.18.0
    - name: Install tools
      run: |
        gem install --no-document toys
    - name: OwlBot
      run: |
        toys owlbot -v --pull --fork --pull-googleapis --bazelisk ${GITHUB_EVENT_INPUTS_FLAGS} ${GITHUB_EVENT_INPUTS_GEMS}
      env:
        GITHUB_EVENT_INPUTS_FLAGS: ${{ github.event.inputs.flags }}
        GITHUB_EVENT_INPUTS_GEMS: ${{ github.event.inputs.gems }}
