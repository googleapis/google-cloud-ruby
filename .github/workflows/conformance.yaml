# This workflow runs the Bigtable Conformance Test suite against the Bigtable
# client library.
# See https://github.com/googleapis/cloud-bigtable-clients-test
permissions:
  contents: read

on:
  push:
    branches:
    - main
    paths:
      - 'google-cloud-bigtable/**'
  pull_request:
    paths:
      - 'google-cloud-bigtable/**'
name: conformance
jobs:
  bigtable_conformance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby_version: [
          '3.2',
          '3.3',
          '3.4',
          '4.0',
        ]
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        persist-credentials: false
    - uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
      with:
        ruby-version: ${{ matrix.ruby_version }}
        bundler-cache: true
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '>=1.23.0'
    - name: Install tools
      run: "gem install --no-document toys"
    - name: Install dependencies
      run: "cd google-cloud-bigtable/conformance/test_proxy && bundle install"
    - name: Run tests
      run: "cd google-cloud-bigtable && toys conformance test -v"
