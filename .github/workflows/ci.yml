name: CI

permissions:
  contents: read
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "21 8 * * *"
  workflow_dispatch:
    inputs:
      head:
        description: "Commit reference at which to run tests"
        required: false
      base:
        description: "Commit reference from which to evaluate diffs"
        required: false
      flags:
        description: "Extra flags to pass to toys ci"
        required: false

jobs:
  CI:
    if: ${{ github.repository == 'googleapis/google-cloud-ruby' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ruby: "3.2"
            task: "--test"
          - os: ubuntu-latest
            ruby: "3.3"
            task: "--test"
          - os: ubuntu-latest
            ruby: "3.4"
            task: "--test"
          - os: ubuntu-latest
            ruby: "4.0"
            task: "--test"
          - os: ubuntu-latest
            ruby: "4.0"
            # (b/515549177): Disabled linkinator globally due to broken external doc links.
            task: "--rubocop-toplevel --rubocop --build --yard"
          - os: macos-latest
            ruby: "4.0"
            task: "--test"
          - os: windows-latest
            ruby: "4.0"
            task: "--test"
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false
    - name: Install Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
      with:
        ruby-version: "${{ matrix.ruby }}"
    - name: Install NodeJS 18.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: "18.x || 24.x"
    - name: Install tools
      # zizmor: ignore[template-injection]
      run: "gem install --no-document toys && npm install linkinator"
    - name: Test ${{ matrix.task }}
      # zizmor: ignore[template-injection]
      run: |
        toys ci -v ${{ matrix.task }} --github-event-name=${{ github.event_name }} --github-event-payload=${{ github.event_path }} ${{ github.event.inputs.flags }}
    - name: Open Issues
      if: ${{ failure() }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        toys ci report-failures --github-action-id=${{ github.run_id }} -v
